name: Build All Platform Binaries

on:
  workflow_dispatch:
    inputs:
      holochain_version:
        description: 'holochain crate version (e.g. 0.6.0)'
        required: true
        default: '0.6.0'
      hc_version:
        description: 'holochain_cli (hc) crate version (e.g. 0.6.0)'
        required: true
        default: '0.6.0'
      lair_version:
        description: 'lair_keystore crate version (e.g. 0.6.3)'
        required: true
        default: '0.6.3'
      rust_toolchain:
        description: 'Rust toolchain version'
        required: true
        default: '1.88.0'
  repository_dispatch:
    types: [install-release-all]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platforms:
          - host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - host: macos-13
            target: x86_64-apple-darwin
          - host: macos-14
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platforms.host }}

    env:
      MACOSX_DEPLOYMENT_TARGET: '10.13'
      HC_VERSION: ${{ github.event.inputs.holochain_version || github.event.client_payload.holochain_version }}
      HCC_VERSION: ${{ github.event.inputs.hc_version || github.event.client_payload.hc_version }}
      LAIR_VERSION: ${{ github.event.inputs.lair_version || github.event.client_payload.lair_version }}
      RUST_VERSION: ${{ github.event.inputs.rust_toolchain || '1.88.0' }}

    steps:
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platforms.host == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libssl-dev pkg-config

      - name: Install Perl (Windows)
        if: runner.os == 'Windows'
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'

      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Create build output dir
        run: mkdir binaries
        shell: bash

      - name: Build binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          cargo install --version ${{ env.LAIR_VERSION }} lair_keystore
          $LkPath = Get-Command lair-keystore | Select-Object -ExpandProperty Definition
          Copy-Item $LkPath -Destination binaries/lair-keystore-v${{ env.LAIR_VERSION }}-${{ matrix.platforms.target }}.exe

          cargo install holochain --version ${{ env.HC_VERSION }} --locked
          $HcPath = Get-Command holochain | Select-Object -ExpandProperty Definition
          Copy-Item $HcPath -Destination binaries/holochain-v${{ env.HC_VERSION }}-${{ matrix.platforms.target }}.exe

          cargo install holochain_cli --version ${{ env.HCC_VERSION }} --locked
          $CliPath = Get-Command hc | Select-Object -ExpandProperty Definition
          Copy-Item $CliPath -Destination binaries/hc-v${{ env.HCC_VERSION }}-${{ matrix.platforms.target }}.exe

      - name: Build binaries (Linux & macOS)
        if: runner.os != 'Windows'
        run: |
          cargo install --version ${{ env.LAIR_VERSION }} lair_keystore
          LAIR_PATH=$(which lair-keystore)
          cp "$LAIR_PATH" binaries/lair-keystore-v${{ env.LAIR_VERSION }}-${{ matrix.platforms.target }}

          cargo install holochain --version ${{ env.HC_VERSION }} --locked
          HOLOCHAIN_PATH=$(which holochain)
          cp "$HOLOCHAIN_PATH" binaries/holochain-v${{ env.HC_VERSION }}-${{ matrix.platforms.target }}

          cargo install holochain_cli --version ${{ env.HCC_VERSION }} --locked
          HC_PATH=$(which hc)
          cp "$HC_PATH" binaries/hc-v${{ env.HCC_VERSION }}-${{ matrix.platforms.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platforms.target }}
          path: |
            binaries/lair-keystore-*
            binaries/holochain-*
            binaries/hc-*
          if-no-files-found: error

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Resolve version for tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.holochain_version || github.event.client_payload.holochain_version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*"
          name: "Binaries for holochain ${{ steps.version.outputs.version }}"
          body: |
            Prebuilt binaries for Holochain ${{ steps.version.outputs.version }}.

            Includes holochain, hc (holochain_cli), and lair-keystore for:
            - Linux x86_64 (x86_64-unknown-linux-gnu)
            - macOS Intel (x86_64-apple-darwin)
            - macOS Apple Silicon (aarch64-apple-darwin)
            - Windows x86_64 (x86_64-pc-windows-msvc)

            Built with Rust ${{ github.event.inputs.rust_toolchain || '1.88.0' }} via cargo install from crates.io.
          tag: "${{ steps.version.outputs.version }}"
          draft: true
